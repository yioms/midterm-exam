<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyQuiz — Master Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --pt-color: #7c6aff;
    --sts-color: #00c896;
    --ip-color: #ff7043;
    --mmw-color: #f7c948;
    --correct: #22c55e;
    --wrong: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── BG noise texture ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  #app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #7c6aff, #00c896);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-left: 2px; }
  .header-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .pill {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 99px; padding: 4px 12px;
    font-size: 12px; color: var(--muted);
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME SCREEN ── */
  #home { padding: 48px 32px; max-width: 900px; margin: 0 auto; }
  .home-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: clamp(32px, 5vw, 52px); line-height: 1.1;
    letter-spacing: -2px; margin-bottom: 12px;
  }
  .home-title span { 
    background: linear-gradient(90deg, #7c6aff, #00c896, #f7c948);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .home-sub { color: var(--muted); font-size: 16px; margin-bottom: 48px; max-width: 520px; }
  .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .subject-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .subject-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color);
  }
  .subject-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .subject-card:hover { border-color: var(--accent-color); }
  .subject-icon { font-size: 28px; margin-bottom: 12px; }
  .subject-name {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px;
    margin-bottom: 6px;
  }
  .subject-desc { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .subject-stats { display: flex; gap: 16px; }
  .stat { font-size: 12px; color: var(--muted); }
  .stat strong { color: var(--text); font-weight: 600; }

  /* ── LESSON SELECT ── */
  #lesson-select { padding: 40px 32px; max-width: 800px; margin: 0 auto; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); background: var(--card);
    border-radius: 8px; padding: 7px 14px; margin-bottom: 32px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }
  .section-title {
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 26px;
    letter-spacing: -1px; margin-bottom: 6px;
  }
  .section-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .lessons-list { display: flex; flex-direction: column; gap: 12px; }
  .lesson-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s, transform 0.15s;
  }
  .lesson-item:hover { border-color: var(--accent); transform: translateX(4px); }
  .lesson-name { font-weight: 500; font-size: 15px; }
  .lesson-count { font-size: 12px; color: var(--muted); }
  .lesson-arrow { color: var(--muted); font-size: 18px; }
  .lesson-all-btn {
    background: linear-gradient(135deg, var(--accent-start, #7c6aff), var(--accent-end, #00c896));
    border: none; color: #fff; border-radius: 12px; padding: 18px 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s, transform 0.15s;
  }
  .lesson-all-btn:hover { opacity: 0.9; transform: translateX(4px); }

  /* ── TOPIC SELECT ── */
  #topic-select { padding: 40px 32px; max-width: 800px; margin: 0 auto; }
  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .topic-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s, transform 0.15s;
    font-size: 14px;
  }
  .topic-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  .topic-item-all {
    background: var(--surface); border: 1px dashed var(--border);
    border-radius: 10px; padding: 14px 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s; font-size: 14px; color: var(--muted);
    grid-column: 1 / -1;
  }
  .topic-item-all:hover { border-color: var(--accent); color: var(--text); }

  /* ── QUIZ SCREEN ── */
  #quiz { padding: 32px; max-width: 720px; margin: 0 auto; }
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .quiz-meta { font-size: 12px; color: var(--muted); }
  .quiz-meta strong { color: var(--text); }
  .progress-bar-wrap {
    height: 4px; background: var(--border); border-radius: 99px;
    margin-bottom: 36px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #7c6aff, #00c896);
    transition: width 0.4s ease;
  }
  .question-num {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }
  .question-text {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 20px;
    line-height: 1.4; letter-spacing: -0.4px; margin-bottom: 28px;
  }
  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
  .option-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 20px; cursor: pointer;
    text-align: left; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; display: flex; align-items: center; gap: 14px;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); transform: translateX(4px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: rgba(34,197,94,0.12); border-color: var(--correct); color: #86efac; }
  .option-btn.wrong { background: rgba(239,68,68,0.1); border-color: var(--wrong); color: #fca5a5; }
  .option-letter {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px;
    flex-shrink: 0; transition: background 0.15s, border-color 0.15s;
  }
  .option-btn.correct .option-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option-btn.wrong .option-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .feedback-box {
    display: none; border-radius: 10px; padding: 12px 16px;
    font-size: 13px; margin-bottom: 20px; line-height: 1.5;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  .feedback-box.wrong { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .next-btn {
    display: none; width: 100%; padding: 15px;
    background: linear-gradient(135deg, #7c6aff, #5f4de0);
    border: none; border-radius: 12px; color: #fff;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn.show { display: block; }

  /* ── RESULTS SCREEN ── */
  #results { padding: 48px 32px; max-width: 640px; margin: 0 auto; text-align: center; }
  .results-icon { font-size: 56px; margin-bottom: 20px; }
  .results-title {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 38px;
    letter-spacing: -2px; margin-bottom: 8px;
  }
  .results-sub { color: var(--muted); margin-bottom: 36px; }
  .score-ring {
    width: 160px; height: 160px; border-radius: 50%;
    background: conic-gradient(var(--ring-color, #7c6aff) var(--pct, 0%), var(--border) 0%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 36px;
    box-shadow: 0 0 0 4px var(--bg);
  }
  .score-inner {
    width: 120px; height: 120px; border-radius: 50%;
    background: var(--card);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 36px; line-height: 1; }
  .score-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .results-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 36px; }
  .result-stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 24px; flex: 1;
  }
  .result-stat-num { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 24px; }
  .result-stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: linear-gradient(135deg, #7c6aff, #5f4de0);
    border: none; color: #fff; border-radius: 10px; padding: 12px 28px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 12px 28px;
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: var(--muted); }

  /* ── FILL IN BLANK / ID INPUT ── */
  .fitb-wrap { margin-bottom: 24px; }
  .fitb-input-row { display: flex; gap: 10px; align-items: stretch; }
  .fitb-input {
    flex: 1; background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 14px 18px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color 0.2s; outline: none;
  }
  .fitb-input:focus { border-color: var(--accent, #7c6aff); }
  .fitb-input.correct-input { border-color: var(--correct); background: rgba(34,197,94,0.08); color: #86efac; }
  .fitb-input.wrong-input { border-color: var(--wrong); background: rgba(239,68,68,0.08); color: #fca5a5; }
  .fitb-input:disabled { opacity: 0.8; cursor: default; }
  .fitb-submit {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 12px; padding: 14px 20px; cursor: pointer;
    color: var(--text); font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 13px; white-space: nowrap; transition: border-color 0.2s, background 0.2s;
  }
  .fitb-submit:hover:not(:disabled) { border-color: var(--accent, #7c6aff); background: var(--surface); }
  .fitb-submit:disabled { opacity: 0.5; cursor: default; }
  .fitb-hint {
    margin-top: 10px; font-size: 12px; color: var(--muted);
    padding: 8px 12px; background: var(--surface); border-radius: 8px;
    border-left: 3px solid var(--border);
  }
  .type-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 99px; padding: 3px 10px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 14px;
  }

  /* ── RETRY WRONG BTN ── */
  .btn-retry-wrong {
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.4);
    color: #fca5a5; border-radius: 10px; padding: 12px 28px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  .btn-retry-wrong:hover { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.7); }
  .btn-retry-wrong:disabled { opacity: 0.35; cursor: default; }

  /* ── REVIEW SCREEN ── */
  #review { padding: 40px 32px; max-width: 720px; margin: 0 auto; }
  .review-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 14px;
  }
  .review-q { font-weight: 500; margin-bottom: 12px; font-size: 14px; }
  .review-options { display: flex; flex-direction: column; gap: 6px; }
  .review-opt {
    padding: 9px 14px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--border); color: var(--muted);
  }
  .review-opt.correct-ans { background: rgba(34,197,94,0.1); border-color: var(--correct); color: #86efac; }
  .review-opt.user-wrong { background: rgba(239,68,68,0.08); border-color: var(--wrong); color: #fca5a5; }
  .review-badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 99px; margin-bottom: 10px;
  }
  .review-badge.correct { background: rgba(34,197,94,0.15); color: #86efac; }
  .review-badge.wrong { background: rgba(239,68,68,0.15); color: #fca5a5; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .screen.active { animation: fadeUp 0.35s ease both; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .option-btn.correct { animation: pop 0.3s ease; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    header, #home, #lesson-select, #topic-select, #quiz, #results, #review { padding: 24px 18px; }
    .subjects-grid { grid-template-columns: 1fr; }
    .home-title { font-size: 28px; }
    .question-text { font-size: 17px; }
  }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo-mark">📚</div>
  <div>
    <div class="logo-text">StudyQuiz</div>
    <div class="logo-sub">Master Reviewer</div>
  </div>
  <div class="header-right">
    <div class="pill" id="total-q-pill">Loading...</div>
  </div>
</header>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-title">Choose a<br><span>Subject to Study</span></div>
  <p class="home-sub">Comprehensive quiz covering all lessons and topics from your reviewer materials.</p>
  <div class="subjects-grid" id="subjects-grid"></div>
</div>

<!-- LESSON SELECT -->
<div id="lesson-select" class="screen">
  <button class="back-btn" onclick="goHome()">← Back to Subjects</button>
  <div class="section-title" id="ls-title"></div>
  <div class="section-sub" id="ls-sub"></div>
  <div class="lessons-list" id="lessons-list"></div>
</div>

<!-- TOPIC SELECT -->
<div id="topic-select" class="screen">
  <button class="back-btn" id="topic-back-btn">← Back to Lessons</button>
  <div class="section-title" id="ts-title"></div>
  <div class="section-sub" id="ts-sub"></div>
  <div class="topics-grid" id="topics-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="exitQuiz()">✕ Exit</button>
    <div class="quiz-meta"><strong id="q-subject"></strong> · <span id="q-topic"></span></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="question-num" id="q-num"></div>
  <div class="question-text" id="q-text"></div>
  <div class="options-list" id="options-list"></div>
  <div class="feedback-box" id="feedback-box"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="results-icon" id="results-icon"></div>
  <div class="results-title" id="results-title"></div>
  <div class="results-sub" id="results-sub"></div>
  <div class="score-ring" id="score-ring">
    <div class="score-inner">
      <div class="score-num" id="score-num"></div>
      <div class="score-label">Score</div>
    </div>
  </div>
  <div class="results-stats">
    <div class="result-stat">
      <div class="result-stat-num" id="r-correct" style="color:#22c55e"></div>
      <div class="result-stat-label">Correct</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" id="r-wrong" style="color:#ef4444"></div>
      <div class="result-stat-label">Wrong</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-num" id="r-total"></div>
      <div class="result-stat-label">Total</div>
    </div>
  </div>
  <div class="results-actions">
    <button class="btn-primary" onclick="retryQuiz()">↺ Retry All</button>
    <button class="btn-retry-wrong" id="btn-retry-wrong" onclick="retryWrongOnly()">🎯 Retry Wrong Only</button>
    <button class="btn-secondary" onclick="showReview()">📋 Review Answers</button>
    <button class="btn-secondary" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<!-- REVIEW -->
<div id="review" class="screen">
  <button class="back-btn" onclick="showResults()">← Back to Results</button>
  <div class="section-title" style="margin-bottom:6px">Review Answers</div>
  <div class="section-sub" id="review-sub"></div>
  <div id="review-list"></div>
</div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// QUIZ DATA
// ═══════════════════════════════════════════════════════════════
const DATA = {
  "Platform Technology": {
    color: "#7c6aff", icon: "🖥️",
    lessons: {
      "Lesson 1 – Platform Basics & Types": {
        "Core Meanings & Definitions": [
          {q:"What is a platform in the context of technology?",o:["A physical stage","A group of technologies used as a base for other apps/processes","A type of operating system","A cloud storage service"],a:1},
          {q:"What is Platform Technology?",o:["A tool for managing databases","A structure/building block where users build or run business applications","A type of mobile app","A security system"],a:1},
          {q:"What is the key idea behind a platform?",o:["It replaces all existing apps","It is the 'foundation' that makes building many apps faster and easier","Only used for gaming","Stores all user data"],a:1},
          {q:"Why is platform technology preferred over building from scratch?",o:["It is more expensive","Reuse the same base for faster development and easier expansion","It limits innovation","Only for large companies"],a:1},
        ],
        "Benefits of Platform Technology": [
          {q:"Which benefit refers to hiding inner workings using well-defined interfaces?",o:["Shared Services","Abstraction","User-Generated","Flexible"],a:1},
          {q:"What does 'Shared Services' mean in platform technology?",o:["Services shared only between admins","Reusable services/components that many apps can use","Cloud storage systems","Security tools"],a:1},
          {q:"Which benefit refers to platforms that grow because users contribute content/value?",o:["Abstraction","Flexible + Adaptable","User-Generated","Shared Services"],a:2},
          {q:"What does 'Flexible + Adaptable' mean in platform technology?",o:["Only works on Windows","Can support different devices/needs and adjust over time","Only used for mobile apps","Requires constant rebuilding"],a:1},
        ],

// HELPERS
// ═══════════════════════════════════════════════════════════════
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function countAll(subject) {
  let n = 0;
  Object.values(subject.lessons).forEach(lesson => {
    Object.values(lesson).forEach(topic => { n += topic.length; });
  });
  return n;
}

function countLesson(lessons, lessonName) {
  let n = 0;
  Object.values(lessons[lessonName]).forEach(t => { n += t.length; });
  return n;
}

function getAllForLesson(lessons, lessonName) {
  let qs = [];
  Object.entries(lessons[lessonName]).forEach(([topicName, qlist]) => {
    qlist.forEach(q => qs.push({...q, _topic: topicName}));
  });
  return shuffle(qs);
}

function getAllForSubject(subjectKey) {
  let qs = [];
  const subject = DATA[subjectKey];
  Object.entries(subject.lessons).forEach(([lessonName, topics]) => {
    Object.entries(topics).forEach(([topicName, qlist]) => {
      qlist.forEach(q => qs.push({...q, _topic: topicName, _lesson: lessonName}));
    });
  });
  return shuffle(qs);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════════
// INIT HOME
// ═══════════════════════════════════════════════════════════════
function initHome() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  let totalAll = 0;

  Object.entries(DATA).forEach(([subjectKey, subject]) => {
    const total = countAll(subject);
    totalAll += total;
    const lessons = Object.keys(subject.lessons).length;
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.style.setProperty('--accent-color', subject.color);
    card.innerHTML = `
      <div class="subject-icon">${subject.icon}</div>
      <div class="subject-name">${subjectKey}</div>
      <div class="subject-desc">All lessons and topics covered</div>
      <div class="subject-stats">
        <div class="stat"><strong>${total}</strong> questions</div>
        <div class="stat"><strong>${lessons}</strong> lessons</div>
      </div>
    `;
    card.onclick = () => selectSubject(subjectKey);
    grid.appendChild(card);
  });

  document.getElementById('total-q-pill').textContent = `${totalAll} total questions`;
}

// ═══════════════════════════════════════════════════════════════
// SUBJECT SELECT
// ═══════════════════════════════════════════════════════════════
function selectSubject(subjectKey) {
  currentSubject = subjectKey;
  const subject = DATA[subjectKey];

  document.getElementById('ls-title').textContent = subjectKey;
  document.getElementById('ls-title').style.color = subject.color;
  document.getElementById('ls-sub').textContent = `${subject.icon} Choose a lesson or practice all questions`;

  const list = document.getElementById('lessons-list');
  list.innerHTML = '';

  // All lessons button
  const allBtn = document.createElement('button');
  allBtn.className = 'lesson-all-btn';
  allBtn.style.setProperty('--accent-start', subject.color);
  allBtn.style.setProperty('--accent-end', subject.color + 'aa');
  const totalQs = countAll(subject);
  allBtn.innerHTML = `<span>⚡ All Lessons (${totalQs} questions)</span><span>→</span>`;
  allBtn.onclick = () => startQuiz(getAllForSubject(subjectKey), `All of ${subjectKey}`, subjectKey);
  list.appendChild(allBtn);

  // Individual lessons
  Object.entries(subject.lessons).forEach(([lessonName, topics]) => {
    const count = countLesson(subject.lessons, lessonName);
    const item = document.createElement('div');
    item.className = 'lesson-item';
    item.style.setProperty('--accent', subject.color);
    item.innerHTML = `
      <div>
        <div class="lesson-name">${lessonName}</div>
        <div class="lesson-count">${count} questions · ${Object.keys(topics).length} topics</div>
      </div>
      <div class="lesson-arrow">→</div>
    `;
    item.onclick = () => selectLesson(subjectKey, lessonName);
    list.appendChild(item);
  });

  showScreen('lesson-select');
}

function goHome() { showScreen('home'); }

// LESSON SELECT → TOPIC SELECT
// ═══════════════════════════════════════════════════════════════
function selectLesson(subjectKey, lessonName) {
  currentLesson = lessonName;
  const subject = DATA[subjectKey];
  const topics = subject.lessons[lessonName];

  document.getElementById('ts-title').textContent = lessonName;
  document.getElementById('ts-title').style.color = subject.color;
  document.getElementById('ts-sub').textContent = `Choose a topic or practice all`;
  document.getElementById('topic-back-btn').onclick = () => selectSubject(subjectKey);

  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';

  // All topics
  const allItem = document.createElement('div');
  allItem.className = 'topic-item-all';
  allItem.style.setProperty('--accent', subject.color);
  const lessonTotal = countLesson(subject.lessons, lessonName);
  allItem.innerHTML = `<span>⚡ All Topics — ${lessonTotal} questions</span><span>→</span>`;
  allItem.onclick = () => startQuiz(getAllForLesson(subject.lessons, lessonName), lessonName, subjectKey);
  grid.appendChild(allItem);

  // Individual topics
  Object.entries(topics).forEach(([topicName, qlist]) => {
    const item = document.createElement('div');
    item.className = 'topic-item';
    item.style.setProperty('--accent', subject.color);
    item.innerHTML = `
      <span>${topicName}</span>
      <span style="color:var(--muted);font-size:12px">${qlist.length}q →</span>
    `;
    item.onclick = () => startQuiz(shuffle(qlist).map(q => ({...q, _topic: topicName})), topicName, subjectKey);
    grid.appendChild(item);
  });

  showScreen('topic-select');
}

// ═══════════════════════════════════════════════════════════════
// START QUIZ
// ═══════════════════════════════════════════════════════════════
function startQuiz(questions, topicLabel, subjectKey) {
  quizQuestions = questions;
  currentQIndex = 0;
  score = 0;
  userAnswers = [];
  answered = false;

  const subject = DATA[subjectKey];
  document.getElementById('q-subject').textContent = subjectKey;
  document.getElementById('q-subject').style.color = subject.color;
  document.getElementById('q-topic').textContent = topicLabel;

  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = quizQuestions[currentQIndex];
  answered = false;

  const total = quizQuestions.length;
  const current = currentQIndex + 1;
  const pct = ((currentQIndex) / total) * 100;

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('q-num').textContent = `Question ${current} of ${total}`;

  const feedback = document.getElementById('feedback-box');
  feedback.className = 'feedback-box';
  feedback.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.className = 'next-btn';
  nextBtn.textContent = currentQIndex === quizQuestions.length - 1 ? 'See Results →' : 'Next Question →';

  const optsList = document.getElementById('options-list');
  optsList.innerHTML = '';

  // ── type badge ──
  const qType = q.type || 'mc';
  const typeMeta = { mc: ['🔘','Multiple Choice'], fitb: ['✏️','Fill in the Blank'], id: ['🏷️','Identification'] };
  const [tIcon, tLabel] = typeMeta[qType] || typeMeta.mc;

  // Build question area
  const qText = document.getElementById('q-text');
  qText.innerHTML = `<span class="type-badge">${tIcon} ${tLabel}</span><br>${q.q}`;

  if (qType === 'mc') {
    const letters = ['A', 'B', 'C', 'D'];
    q.o.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt}</span>`;
      btn.onclick = () => selectMC(i, q.a, btn);
      optsList.appendChild(btn);
    });
  } else {
    // Fill in blank OR Identification
    const wrap = document.createElement('div');
    wrap.className = 'fitb-wrap';
    const row = document.createElement('div');
    row.className = 'fitb-input-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'fitb-input';
    input.id = 'fitb-input';
    input.placeholder = qType === 'fitb' ? 'Type your answer here...' : 'Identify the term...';
    input.autocomplete = 'off';
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });
    const submitBtn = document.createElement('button');
    submitBtn.className = 'fitb-submit';
    submitBtn.textContent = 'Submit';
    submitBtn.onclick = submitText;
    row.appendChild(input);
    row.appendChild(submitBtn);
    wrap.appendChild(row);
    if (q.hint) {
      const hint = document.createElement('div');
      hint.className = 'fitb-hint';
      hint.textContent = '💡 Hint: ' + q.hint;
      wrap.appendChild(hint);
    }
    optsList.appendChild(wrap);
    setTimeout(() => input.focus(), 100);
  }
}

function selectMC(chosen, correct, clickedBtn) {
  if (answered) return;
  answered = true;
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);
  const feedback = document.getElementById('feedback-box');
  if (chosen === correct) {
    score++;
    clickedBtn.classList.add('correct');
    feedback.textContent = '✓ Correct!';
    feedback.className = 'feedback-box correct show';
    userAnswers.push({ chosen, correct, isCorrect: true, userText: null });
  } else {
    clickedBtn.classList.add('wrong');
    buttons[correct].classList.add('correct');
    const correctText = quizQuestions[currentQIndex].o[correct];
    feedback.textContent = `✗ Incorrect. The correct answer is: ${correctText}`;
    feedback.className = 'feedback-box wrong show';
    userAnswers.push({ chosen, correct, isCorrect: false, userText: null });
  }
  document.getElementById('next-btn').classList.add('show');
}

function submitText() {
  if (answered) return;
  const input = document.getElementById('fitb-input');
  if (!input) return;
  const userVal = input.value.trim();
  if (!userVal) return;
  answered = true;
  input.disabled = true;
  const submitBtn = input.parentElement.querySelector('.fitb-submit');
  if (submitBtn) submitBtn.disabled = true;

  const q = quizQuestions[currentQIndex];
  const correct = q.a;
  const isCorrect = userVal.toLowerCase() === correct.toLowerCase();

  const feedback = document.getElementById('feedback-box');
  if (isCorrect) {
    score++;
    input.classList.add('correct-input');
    feedback.textContent = '✓ Correct!';
    feedback.className = 'feedback-box correct show';
  } else {
    input.classList.add('wrong-input');
    feedback.textContent = `✗ Incorrect. The correct answer is: ${correct}`;
    feedback.className = 'feedback-box wrong show';
  }
  userAnswers.push({ chosen: -1, correct: -1, isCorrect, userText: userVal, correctText: correct });
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentQIndex++;
  if (currentQIndex >= quizQuestions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function exitQuiz() {
  if (currentSubject) {
    selectSubject(currentSubject);
  } else {
    goHome();
  }
}

// ═══════════════════════════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════════════════════════
function showResults() {
  const total = quizQuestions.length;
  const pct = Math.round((score / total) * 100);
  const wrong = total - score;

  let icon, title, color;
  if (pct >= 90) { icon = '🏆'; title = 'Excellent!'; color = '#f7c948'; }
  else if (pct >= 75) { icon = '🎯'; title = 'Great Job!'; color = '#22c55e'; }
  else if (pct >= 60) { icon = '📚'; title = 'Keep Studying!'; color = '#7c6aff'; }
  else { icon = '💪'; title = 'Practice More!'; color = '#ef4444'; }

  document.getElementById('results-icon').textContent = icon;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-sub').textContent = `You scored ${score} out of ${total} questions`;
  document.getElementById('score-num').textContent = pct + '%';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-total').textContent = total;

  const ring = document.getElementById('score-ring');
  ring.style.setProperty('--ring-color', color);
  ring.style.setProperty('--pct', pct + '%');

  // Enable/disable retry wrong button
  const retryWrongBtn = document.getElementById('btn-retry-wrong');
  const wrongCount = userAnswers.filter(a => !a.isCorrect).length;
  retryWrongBtn.disabled = wrongCount === 0;
  retryWrongBtn.textContent = wrongCount > 0 ? `🎯 Retry Wrong Only (${wrongCount})` : '🎯 No Wrong Answers!';

  showScreen('results');
}

function retryQuiz() {
  const shuffled = shuffle(quizQuestions);
  quizQuestions = shuffled;
  currentQIndex = 0;
  score = 0;
  userAnswers = [];
  answered = false;
  showScreen('quiz');
  renderQuestion();
}

function retryWrongOnly() {
  const wrongQs = quizQuestions.filter((_, i) => userAnswers[i] && !userAnswers[i].isCorrect);
  if (wrongQs.length === 0) return;
  quizQuestions = shuffle(wrongQs);
  currentQIndex = 0;
  score = 0;
  userAnswers = [];
  answered = false;
  showScreen('quiz');
  renderQuestion();
}

function showReview() {
  const sub = document.getElementById('review-sub');
  sub.textContent = `${score} / ${quizQuestions.length} correct · Review all questions below`;

  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  const typeMeta = { mc: '🔘 MC', fitb: '✏️ Fill-in-Blank', id: '🏷️ Identification' };

  quizQuestions.forEach((q, i) => {
    const ua = userAnswers[i];
    if (!ua) return;
    const isCorrect = ua.isCorrect;
    const qType = q.type || 'mc';

    const item = document.createElement('div');
    item.className = 'review-item';

    if (qType === 'mc') {
      item.innerHTML = `
        <span class="review-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Correct' : '✗ Wrong'} · ${typeMeta[qType]||'MC'}</span>
        <div class="review-q">${i+1}. ${q.q}</div>
        <div class="review-options">
          ${q.o.map((opt, oi) => {
            let cls = 'review-opt';
            if (oi === ua.correct) cls += ' correct-ans';
            else if (oi === ua.chosen && !isCorrect) cls += ' user-wrong';
            return `<div class="${cls}">${letters[oi]}. ${opt}</div>`;
          }).join('')}
        </div>
      `;
    } else {
      item.innerHTML = `
        <span class="review-badge ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ Correct' : '✗ Wrong'} · ${typeMeta[qType]||''}</span>
        <div class="review-q">${i+1}. ${q.q}</div>
        <div class="review-options">
          <div class="review-opt ${!isCorrect ? 'user-wrong' : 'correct-ans'}">Your answer: ${ua.userText || '—'}</div>
          ${!isCorrect ? `<div class="review-opt correct-ans">✓ Correct answer: ${q.a}</div>` : ''}
        </div>
      `;
    }
    list.appendChild(item);
  });

  showScreen('review');
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
initHome();
</script>
